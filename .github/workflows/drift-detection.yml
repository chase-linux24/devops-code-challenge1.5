name: Terraform Drift Detection

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

permissions:
  id-token: write
  contents: read
  issues: write

env:
  AWS_REGION: us-east-2
  TF_DIR: infrastructure/terraform

jobs:
  detect-drift:
    name: Detect Infrastructure Drift
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::381491979307:role/github-actions-devops-challenge
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: '~1.5'
          terraform_wrapper: false

      - name: Terraform Init
        working-directory: ${{ env.TF_DIR }}
        run: terraform init

      - name: Check for drift
        id: drift
        working-directory: ${{ env.TF_DIR }}
        continue-on-error: true
        run: |
          terraform plan -detailed-exitcode -out=tfplan 2>&1
          EXIT_CODE=$?
          if [ $EXIT_CODE -eq 0 ]; then
            echo "drift=false" >> $GITHUB_OUTPUT
            echo "No drift detected"
          elif [ $EXIT_CODE -eq 2 ]; then
            echo "drift=true" >> $GITHUB_OUTPUT
            echo "DRIFT DETECTED"
            terraform show tfplan
          else
            echo "Terraform plan failed"
            exit 1
          fi

      - name: Open GitHub issue if drift detected
        if: steps.drift.outputs.drift == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const date = new Date().toISOString()
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `Infrastructure Drift Detected - ${date}`,
              body: `## Infrastructure Drift Detected\n\nTerraform detected a difference between the code in this repository and the actual state of AWS infrastructure.\n\n**Detected at:** ${date}\n**Workflow:** ${context.workflow}\n**Run ID:** ${context.runId}\n\n### What to do\n1. Review the workflow run logs to see what changed\n2. Update Terraform code if the change was intentional\n3. Run terraform apply to revert if the change was unintentional\n\n### GitOps Principle\nAll infrastructure changes must go through Git.`,
              labels: ['drift', 'infrastructure', 'urgent']
            })